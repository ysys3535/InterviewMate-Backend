spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update

    show-sql: true

    properties:
      hibernate:
        format_sql: true

gemini:
  api-key: ${GEMINI_API_KEY}
  model: ${GEMINI_MODEL:gemini-3.1-flash-lite}

elevenlabs:
  api-key: ${ELEVENLABS_API_KEY}
  voice-id: ${ELEVENLABS_VOICE_ID:JBFqnCBsd6RMkjVDRZzb}
  tts-model: ${ELEVENLABS_TTS_MODEL:eleven_multilingual_v2}
  tts-output-format: ${ELEVENLABS_TTS_OUTPUT_FORMAT:mp3_44100_128}
  tts-language-code: ${ELEVENLABS_TTS_LANGUAGE_CODE:ko}
